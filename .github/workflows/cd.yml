name: Continuous Deployment
on:
  push:
    branches: [main, 'release/**']

permissions:
  id-token: write
  issues: write
  contents: write
  pull-requests: write

jobs:
  resolve-version:
    # Gate the npm release pipeline to the canonical upstream repo. Forks
    # publish their own artifacts (e.g. via a git URL or a separate
    # workflow); without this guard the inherited release-please job runs
    # on every fork push and fails noisily (and depends on secrets /
    # repo settings the fork doesn't have).
    if: github.repository == 'verana-labs/verre'
    uses: 2060-io/organization/.github/workflows/resolve-version-call.yml@main
    with:
      bump-minor-pre-major: false

  release:
    needs: [resolve-version]
    if: github.repository == 'verana-labs/verre' && needs.resolve-version.outputs.new-release-published == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.resolve-version.outputs.release-version }}
      RELEASE_TYPE: ${{ needs.resolve-version.outputs.release-type }}
    steps:

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Corepack pnpm
        # OIDC publishing requires a very up to date npm version
        run: |
          npm install -g npm@11.11.0
          corepack enable

      - run: pnpm install --frozen-lockfile
      - run: pnpm version "$RELEASE_VERSION" --no-git-tag-version --allow-same-version

      - name: Publish to npm
        run: |
          if [ "$RELEASE_TYPE" = "stable" ]; then
            pnpm publish --no-git-checks --access public
          else
            pnpm publish --no-git-checks --access public --tag dev
          fi


